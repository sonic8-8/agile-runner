name: Bug Task
description: 버그 수정용 개발 이슈
title: "[BE] fix: "
labels:
  - "⌨️ BE"
  - "🚨 Bug"
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제
      description: 현재 발생 중인 버그와 배경을 작성해 주세요.
      placeholder: 어떤 상황에서 문제가 발생하는지 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 목표
      description: 이번 이슈로 만들고 싶은 상태를 작성해 주세요.
      placeholder: 수정 후 어떤 상태가 되어야 하는지 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약 조건
      description: 유지해야 할 계약, 회귀 위험, 배포 제약을 작성해 주세요.
      placeholder: 수정 시 깨지면 안 되는 조건을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: 제외 범위
      description: 이번 수정에 포함하지 않을 범위를 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 기준
      description: 재현 방지와 검증 기준을 체크리스트로 작성해 주세요.
      placeholder: |
        - [ ] 재현 케이스가 통과한다.
        - [ ] 관련 회귀 테스트가 추가된다.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 참고
      description: 에러 로그, 스크린샷, 링크를 작성해 주세요.
